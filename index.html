<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon & PWA Icons -->
  <link rel="icon" href="/favicon.ico" sizes="48x48" />
  <link rel="icon" type="image/png" href="/pwa-64x64.png" sizes="64x64" />
  <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA / Theme -->
  <meta name="theme-color" content="#16a34a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="تفهنا ماركت" />

  <!-- SEO -->
  <meta name="description" content="تسوق أونلاين من تفهنا ماركت بكل سهولة وسرعة" />

  <!-- Open Graph -->
  <meta property="og:title" content="تفهنا ماركت" />

  <script>
    // Pre-capture beforeinstallprompt to prevent race conditions during React's mount cycle
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      window.dispatchEvent(new CustomEvent('pwa-deferred-prompt-ready'));
    });
  </script>

  <title>تفهنا ماركت</title>
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
